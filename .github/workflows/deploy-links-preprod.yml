name: Deploy Links to Preprod

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy Preprod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and push image
        run: |
          docker build -t registry.vktnas.synology.me/activiz-links-preprod:latest .
          docker push registry.vktnas.synology.me/activiz-links-preprod:latest

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose-preprod.yml
          target: ~/links-preprod/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd links-preprod
            docker compose -f docker-compose-preprod.yml pull links-preprod
            docker compose -f docker-compose-preprod.yml up -d links-preprod
