services:
  links-preprod:
    image: registry.vktnas.synology.me/activiz-links-preprod:latest
    container_name: activiz-links-preprod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    networks:
      activiz-network:

networks:
  activiz-network:
    external: true
    name: activiz-network
